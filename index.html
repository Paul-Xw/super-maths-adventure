<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#0f172a"><title>Super Maths Adventure v6.1.0.0.2</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="manifest" href="./manifest.webmanifest"><link rel="stylesheet" href="./css/styles.css?v=6.1.0">
</head><body><div class="ver">SMA v6.1.0</div>
<div id="app" class="max-w-7xl mx-auto p-4 md:p-8"><div class="loading">Loading Super Maths Adventure v6.1.0.0.2...</div></div>
<script>
(async function(){
 try{
   if(!localStorage.getItem('sma_v610_cache_reset_done')){
     localStorage.setItem('sma_v610_cache_reset_done','1');
     if('serviceWorker' in navigator){
       const regs=await navigator.serviceWorker.getRegistrations();
       await Promise.all(regs.map(r=>r.unregister()));
     }
     if('caches' in window){
       const keys=await caches.keys();
       await Promise.all(keys.map(k=>caches.delete(k)));
     }
     Object.keys(localStorage).filter(k=>k.startsWith('cache_')).forEach(k=>localStorage.removeItem(k));
   }
 }catch(e){console.warn(e)}
})();

window.addEventListener('error',e=>{document.getElementById('app').innerHTML='<div class="errorBox"><h1>JavaScript Error</h1><p>'+e.message+'</p><p>'+e.filename+':'+e.lineno+'</p></div>'});
if('serviceWorker' in navigator){
 window.addEventListener('load',async()=>{
   try{
     const regs=await navigator.serviceWorker.getRegistrations();
     await Promise.all(regs.map(r=>r.unregister()));
     if('caches' in window){
       const keys=await caches.keys();
       await Promise.all(keys.map(k=>caches.delete(k)));
     }
     await navigator.serviceWorker.register('./sw.js?v=6.1.0');
   }catch(e){console.warn(e)}
 });
}
</script><script type="module" src="./js/app.js?v=6.1.0"></script></body></html>
